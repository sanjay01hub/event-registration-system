<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #5f2c82, #49a09d);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 95%;
      margin: auto;
      background: #fff;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      animation: fadeIn 0.5s ease-in-out;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .search-box {
      position: relative;
    }

    .search-box input {
      padding: 10px 10px 10px 35px;
      width: 250px;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
    }

    .search-box i {
      position: absolute;
      top: 50%;
      left: 10px;
      transform: translateY(-50%);
      color: #888;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: 0.3s;
    }

    .refresh-btn {
      background: #3498db;
      color: white;
    }

    .refresh-btn:hover {
      background: #2980b9;
    }

    .delete-btn {
      background: #e74c3c;
      color: white;
    }

    .delete-btn:hover {
      background: #c0392b;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 10px;
    }

    th {
      background: #5f2c82;
      color: white;
      padding: 12px;
    }

    td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    tr:hover {
      background: #f4f6ff;
    }

    .no-data {
      text-align: center;
      padding: 20px;
      color: gray;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

  <!-- Icons -->
  <script src="https://kit.fontawesome.com/af562a2a63.js" crossorigin="anonymous"></script>

</head>

<body>

<div class="container">

  <h2>📊 Admin Dashboard</h2>

  <div class="top-bar">

    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="search" placeholder="Search by name..." onkeyup="searchStudent()">
    </div>

    <button class="refresh-btn" onclick="loadStudents()">🔄 Refresh</button>

  </div>

  <table id="table">
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>College</th>
      <th>Phone</th>
      <th>Email</th>
      <th>Event</th>
      <th>Type</th>
      <!-- <th>Action</th> -->
    </tr>
  </table>

</div>

<script src="admin.js"></script>

</body>
</html>
