<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
<h2>Event Registration</h2>

<input id="name" placeholder="Student Name">
<input id="regno" placeholder="Register Number">
<input id="college" placeholder="College Name">
<input id="event" placeholder="Event Name">

<select id="type" onchange="toggleGroup()">
  <option value="solo">Solo</option>
  <option value="group">Group</option>
</select>

<div id="groupFields" style="display:none;">
  <input id="groupName" placeholder="Group Name">
  <textarea id="members" placeholder="Team Members"></textarea>
</div>

<button onclick="register()">Register</button>
<p id="msg"></p>

</div>

<script src="script.js"></script>
</body>
</html>
