<!DOCTYPE html>
<html>
<head>
  <title>Student Registration</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 400px;
      padding: 25px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      animation: fadeIn 0.6s ease-in-out;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 18px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      transform: scale(1.03);
    }

    .msg {
      text-align: center;
      margin-top: 10px;
      color: green;
      display: none;
      font-weight: bold;
    }

    select:invalid {
      color: gray;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="card">

  <h2>🎓 Student Registration</h2>

  <!-- ✅ FIXED MESSAGE DIV -->
  <div id="msg" class="msg"></div>

  <input id="name" placeholder="Full Name">
  <input id="college" placeholder="College Name">
  <input id="phone" placeholder="Phone Number">
  <input id="email" placeholder="Email Address">

  <!-- EVENT -->
  <select id="event" required>
    <option value="" disabled selected hidden>Select Event</option>
    <option>Hackathon</option>
    <option>Paper Presentation</option>
    <option>Coding</option>
    <option>Debugging</option>
    <option>Quiz</option>
    <option>Poster</option>
    <option>Gaming</option>
    <option>AI Workshop</option>
    <option>Web Design</option>
    <option>Dance</option>
    <option>Music</option>
    <option>Photography</option>
    <option>Short Film</option>
    <option>Drama</option>
    <option>Marketing</option>
    <option>Startup Pitch</option>
    <option>Robotics</option>
    <option>IoT</option>
    <option>Cyber Security</option>
    <option>Data Science</option>
  </select>

  <!-- TYPE -->
  <select id="type" required>
    <option value="" disabled selected hidden>Select Type</option>
    <option value="solo">Solo Participation</option>
    <option value="group">Group Participation</option>
  </select>

  <button onclick="submitForm()">🚀 Register Now</button>

</div>

<script src="student.js"></script>

</body>
</html>
